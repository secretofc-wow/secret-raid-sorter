
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Exo+2:wght@300;400;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; }
  .wow-ref { font-family: 'Exo 2', sans-serif; color: var(--color-text-primary); padding: 1rem 0; }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .grid { display: grid; gap: 6px; }
  .marks-grid { grid-template-columns: repeat(4, 1fr); }
  .abilities-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .mark-card {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 8px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .mark-card:hover { border-color: var(--color-border-primary); }
  .mark-icon { width: 32px; height: 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .mark-info { min-width: 0; }
  .mark-name { font-size: 12px; font-weight: 600; color: var(--color-text-primary); }
  .mark-code { font-size: 10px; font-family: var(--font-mono); color: var(--color-text-secondary); }
  .ability-card {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .ability-card:hover { border-color: var(--color-border-primary); }
  .ability-icon { width: 28px; height: 28px; border-radius: 4px; flex-shrink: 0; object-fit: cover; }
  .ability-name { font-size: 11px; font-weight: 400; color: var(--color-text-primary); }
  .ability-id { font-size: 9px; font-family: var(--font-mono); color: var(--color-text-secondary); }
  .copied-toast {
    position: fixed; bottom: 16px; right: 16px;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 8px 14px;
    font-size: 12px;
    color: var(--color-text-primary);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .copied-toast.show { opacity: 1; }
  .section { margin-bottom: 20px; }
  .class-section { margin-bottom: 16px; }
  .class-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: 6px;
    margin-top: 10px;
  }

</style>

function makeSVG(shape, color) {
  const s = document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('viewBox','0 0 32 32'); s.setAttribute('width','30'); s.setAttribute('height','30');
  let inner = '';
  if (shape === 'skull') {
    inner = `<circle cx="16" cy="13" r="9" fill="${color}"/>
    <rect x="10" y="19" width="5" height="7" rx="1" fill="${color}"/>
    <rect x="17" y="19" width="5" height="7" rx="1" fill="${color}"/>
    <circle cx="12.5" cy="13" r="2.5" fill="#111" opacity="0.7"/>
    <circle cx="19.5" cy="13" r="2.5" fill="#111" opacity="0.7"/>
    <path d="M14 17 h4" stroke="#111" stroke-width="1" stroke-linecap="round"/>`;
  } else if (shape === 'cross') {
    inner = `<rect x="13" y="4" width="6" height="24" rx="2" fill="${color}"/>
    <rect x="4" y="13" width="24" height="6" rx="2" fill="${color}"/>`;
  } else if (shape === 'square') {
    inner = `<rect x="4" y="4" width="24" height="24" rx="3" fill="${color}"/>`;
  } else if (shape === 'moon') {
    inner = `<path d="M22 16 A10 10 0 1 1 10 8 A7 7 0 0 0 22 16Z" fill="${color}"/>`;
  } else if (shape === 'triangle') {
    inner = `<polygon points="16,3 29,28 3,28" fill="${color}" rx="2"/>`;
  } else if (shape === 'circle') {
    inner = `<circle cx="16" cy="16" r="12" fill="${color}"/>`;
  } else if (shape === 'diamond') {
    inner = `<polygon points="16,2 30,16 16,30 2,16" fill="${color}"/>`;
  } else if (shape === 'star') {
    inner = `<polygon points="16,2 19.5,12.5 30,12.5 21.5,19 24.5,29.5 16,23 7.5,29.5 10.5,19 2,12.5 12.5,12.5" fill="${color}"/>`;
  }
  s.innerHTML = inner;
  return s.outerHTML;
}

const marksGrid = document.getElementById('marks-grid');
MARKS.forEach(m => {
  const card = document.createElement('div');
  card.className = 'mark-card';
  card.innerHTML = `<div class="mark-icon">${makeSVG(m.shape, m.color)}</div>
    <div class="mark-info">
      <div class="mark-name">${m.name}</div>
      <div class="mark-code">${m.code}</div>
    </div>`;
  card.addEventListener('click', () => copyText(m.code, m.name + ' marker code'));
  marksGrid.appendChild(card);
});

function getIconUrl(id) {
  const icon = SPELL_ICONS[id] || 'inv_misc_questionmark';
  return `${ICON_BASE}${icon}.jpg`;
}

function imageCode(id) {
  return `=image("https://wow.zamimg.com/images/wow/icons/small/${SPELL_ICONS[id] || 'inv_misc_questionmark'}.jpg")`;
}

const container = document.getElementById('abilities-container');
Object.entries(ABILITIES).forEach(([cls, spells]) => {
  const color = CLASS_COLORS[cls] || '#aaa';
  const label = document.createElement('div');
  label.className = 'class-label';
  label.style.color = color;
  label.style.borderBottom = `1px solid ${color}40`;
  label.style.paddingBottom = '3px';
  label.textContent = cls;
  container.appendChild(label);

  const grid = document.createElement('div');
  grid.className = 'grid abilities-grid';
  grid.style.marginBottom = '4px';
  spells.forEach(sp => {
    const card = document.createElement('div');
    card.className = 'ability-card';
    const img = document.createElement('img');
    img.className = 'ability-icon';
    img.src = getIconUrl(sp.id);
    img.alt = sp.name;
    img.onerror = () => { img.style.background = '#333'; img.style.border = '1px solid #555'; };
    const info = document.createElement('div');
    info.innerHTML = `<div class="ability-name">${sp.name}</div><div class="ability-id">ID: ${sp.id}</div>`;
    card.appendChild(img);
    card.appendChild(info);
    card.addEventListener('click', () => copyText(imageCode(sp.id), sp.name + ' image() code'));
    grid.appendChild(card);
  });
  container.appendChild(grid);
});

const toast = document.getElementById('toast');
let toastTimer;
function copyText(text, label) {
  navigator.clipboard.writeText(text).then(() => {
    toast.textContent = `Copied: ${label}`;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  });
}
